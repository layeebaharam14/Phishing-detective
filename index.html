<!doctype html>
<html>
  <head>
    <title>🛡️ Phishing Detective</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: Segoe UI;
        background:
          radial-gradient(
            1200px 700px at 15% 10%,
            rgba(99, 102, 241, 0.45),
            transparent 60%
          ),
          radial-gradient(
            900px 600px at 85% 15%,
            rgba(168, 85, 247, 0.35),
            transparent 55%
          ),
          linear-gradient(135deg, #0b1220, #111a33);
        color: #ffffff;
        text-align: center;
        padding: 40px;
      }

      /* Landing screen only (before Start is clicked) */
      body.landing {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        padding: 0;
      }

      body.landing #hud,
      body.landing #emailBox,
      body.landing #controls,
      body.landing #result {
        display: none !important;
      }

      /* Landing page subtle subtitle */
      #subtitle {
        display: none;
        margin-top: 10px;
        margin-bottom: 18px;
        font-size: 15px;
        color: rgba(255, 255, 255, 0.82);
      }

      #subtitle2 {
        display: none;
        margin-top: 3px;
        margin-bottom: 18px;
        font-size: 12px;
        color: rgba(255, 255, 255, 0.7);
        letter-spacing: 0.2px;
      }

      body.landing #subtitle {
        display: block;
      }

      body.landing #subtitle2 {
        display: block;
      }

      /* Landing background: smooth dark blue/purple gradient */
      body.landing {
        background:
          radial-gradient(
            1100px 700px at 20% 10%,
            rgba(99, 102, 241, 0.5),
            transparent 60%
          ),
          radial-gradient(
            900px 650px at 80% 20%,
            rgba(168, 85, 247, 0.42),
            transparent 58%
          ),
          linear-gradient(135deg, #0b1220, #111a33);
      }

      /* Completion screen: center message + restart button */
      body.completed {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        padding: 0;
      }

      body.completed #hud,
      body.completed #emailBox,
      body.completed #controls,
      body.completed #startBtn,
      body.completed #nextBtn {
        display: none !important;
      }

      body.completed #result {
        margin-top: 0;
        margin-bottom: 14px;
      }

      h1 {
        font-size: 40px;
        margin-bottom: 20px;
        letter-spacing: 0.2px;
        text-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
      }

      button {
        padding: 15px 25px;
        margin: 10px;
        border: none;
        border-radius: 30px;
        font-size: 16px;
        cursor: pointer;
        font-weight: 700;
        letter-spacing: 0.2px;
        transition:
          transform 160ms ease,
          filter 160ms ease,
          box-shadow 160ms ease,
          opacity 160ms ease;
      }

      button:hover {
        transform: translateY(-1px);
        filter: brightness(1.05);
        box-shadow: 0 18px 45px rgba(0, 0, 0, 0.35);
      }

      button:active {
        transform: translateY(0px);
        filter: brightness(0.98);
        box-shadow: 0 10px 28px rgba(0, 0, 0, 0.25);
      }

      button:disabled {
        opacity: 0.7;
        cursor: not-allowed;
        transform: none;
        box-shadow: none;
      }

      .start-btn {
        background: linear-gradient(135deg, #00c896, #22c55e);
        color: white;
      }

      .next-btn {
        background: linear-gradient(135deg, #3b82f6, #06b6d4);
        color: white;
      }

      .phishing-btn {
        background: linear-gradient(135deg, #ff3b3b, #ff0066);
        color: white;
      }

      .safe-btn {
        background: linear-gradient(135deg, #16a34a, #22c55e);
        color: white;
      }

      /* Round + Score (same layout, small HUD) */
      #hud {
        width: 60%;
        max-width: 860px;
        margin: 0 auto 10px auto;
        display: none;
        justify-content: space-between;
        gap: 10px;
      }

      .hud-pill {
        flex: 1;
        padding: 10px 14px;
        border-radius: 999px;
        border: 1px solid rgba(255, 255, 255, 0.14);
        background: rgba(255, 255, 255, 0.08);
        color: #ffffff;
        font-size: 14px;
        font-weight: 700;
        box-shadow: 0 18px 55px rgba(0, 0, 0, 0.22);
        backdrop-filter: blur(10px);
      }

      #emailBox {
        background: rgba(15, 23, 42, 0.88);
        color: #ffffff;
        padding: 20px 22px;
        margin: 20px auto;
        border-radius: 14px;
        width: 60%;
        display: none;
        text-align: left;
        box-shadow: 0 24px 70px rgba(0, 0, 0, 0.35);
        border: 1px solid rgba(255, 255, 255, 0.14);
        backdrop-filter: blur(10px);
      }

      #controls {
        display: none;
      }

      #result {
        margin-top: 20px;
        font-size: 20px;
        font-weight: bold;
        color: #ffffff;
        text-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
      }

      /* Make long email text readable */
      #emailBox {
        line-height: 1.55;
        white-space: pre-wrap;
        word-break: break-word;
      }

      /* Improve small-screen layout without changing structure */
      @media (max-width: 900px) {
        #emailBox,
        #hud {
          width: 92%;
        }
      }
    </style>
  </head>

  <body class="landing">
    <h1>🛡️ Phishing Detective</h1>
    <div id="subtitle">
      Identify and classify phishing emails in real-world scenarios
    </div>
    <div id="subtitle2">Powered by OpenEnv Simulation</div>

    <button class="start-btn" id="startBtn" onclick="startGame()">
      ▶ Start
    </button>
    <button
      class="next-btn"
      id="nextBtn"
      onclick="nextEmail()"
      style="display: none"
    >
      Next Email ➜
    </button>
    <button
      class="start-btn"
      id="restartBtn"
      onclick="restartGame()"
      style="display: none"
    >
      ↻ Restart Game
    </button>

    <div id="hud">
      <div class="hud-pill" id="roundPill">Round: 0</div>
      <div class="hud-pill" id="scorePill">Score: 0</div>
    </div>

    <div id="emailBox"></div>

    <div id="controls">
      <button class="phishing-btn" onclick="makeDecision('phishing')">
        🚨 Phishing
      </button>
      <button class="safe-btn" onclick="makeDecision('safe')">✅ Safe</button>
    </div>

    <div id="result"></div>

    <script>
      const API_BASE = "http://127.0.0.1:8000";

      // Client-side counters (no backend changes)
      let roundCount = 0;
      let scoreTotal = 0;
      let currentEmail = null;
      let hasStarted = false;
      let answeredThisRound = false;
      let maxRounds = 10;

      function setButtonsEnabled(enabled) {
        const btns = document.querySelectorAll("#controls button");
        btns.forEach((b) => (b.disabled = !enabled));
      }

      function updateHud() {
        document.getElementById("hud").style.display = "flex";
        const shownRound = Math.min(roundCount, maxRounds);
        document.getElementById("roundPill").innerText =
          "Round: " + shownRound + " / " + maxRounds;
        document.getElementById("scorePill").innerText = "Score: " + scoreTotal;
      }

      function renderEmailText(email) {
        const hasLink = email?.has_link ? "Yes" : "No";
        const urgent = email?.is_urgent ? "Yes" : "No";
        const difficulty = email?.difficulty ?? "-";
        return (
          "Subject: " +
          (email?.subject ?? "") +
          "\n" +
          "Sender: " +
          (email?.sender ?? "") +
          "\n" +
          "Difficulty: " +
          difficulty +
          "\n" +
          "Link: " +
          hasLink +
          "\n" +
          "Urgency: " +
          urgent +
          "\n\n" +
          "Message:\n" +
          (email?.message ?? "")
        );
      }

      function looksSuspiciousSender(sender) {
        const s = String(sender ?? "").toLowerCase();
        return (
          s.includes("scam") ||
          s.includes("fake") ||
          s.includes("alert") ||
          s.includes("verify") ||
          s.includes("paypai") // lookalike
        );
      }

      function buildFeedback(email, correct) {
        const hasLink = !!email?.has_link;
        const urgent = !!email?.is_urgent;
        const suspiciousSender = looksSuspiciousSender(email?.sender);

        // Required phrases:
        // - link -> "contains a link"
        // - urgent -> "uses urgency"
        // - suspicious sender -> "suspicious sender"
        const indicators = [];
        if (urgent) indicators.push("uses urgency");
        if (hasLink) indicators.push("contains a link");
        if (suspiciousSender) indicators.push("suspicious sender");

        const indicatorText = indicators.length ? indicators.join(" and ") : "";

        if (correct) {
          if (!indicatorText) {
            return "Correct ✅ — This email is safe because no suspicious indicators.";
          }
          return "Correct ✅ — This email " + indicatorText + ".";
        }

        if (!indicatorText) {
          return "Wrong ❌ — This email is safe because no suspicious indicators.";
        }
        return (
          "Wrong ❌ — This email " +
          indicatorText +
          ", which is a common phishing indicator."
        );
      }

      function endGame() {
        updateHud();
        setButtonsEnabled(false);
        document.body.classList.add("completed");
        const nextBtn = document.getElementById("nextBtn");
        nextBtn.disabled = true;
        nextBtn.style.opacity = "0.7";
        nextBtn.style.display = "none";

        // Hide action buttons at completion
        document.getElementById("controls").style.display = "none";
        // Hide email card + HUD for a clean completion screen
        document.getElementById("emailBox").style.display = "none";
        document.getElementById("hud").style.display = "none";

        // Show restart option
        document.getElementById("restartBtn").style.display = "inline-block";
        document.getElementById("result").innerText =
          "Game Completed 🎉 Your final score: " + scoreTotal;
      }

      async function loadEmail() {
        if (roundCount >= maxRounds) {
          endGame();
          return;
        }
        document.body.classList.remove("completed");
        document.getElementById("result").innerText = "";
        setButtonsEnabled(false);

        const res = await fetch(`${API_BASE}/reset`, { method: "POST" });
        const data = await res.json();
        const email = data?.email;

        currentEmail = email;
        answeredThisRound = false;
        roundCount = Math.min(roundCount + 1, maxRounds);
        updateHud();

        document.getElementById("emailBox").style.display = "block";
        document.getElementById("controls").style.display = "block";
        document.getElementById("emailBox").innerText = renderEmailText(email);

        // During email view: hide Next, allow choice buttons.
        document.getElementById("nextBtn").style.display = "none";
        document.getElementById("nextBtn").disabled = false;
        document.getElementById("restartBtn").style.display = "none";
        setButtonsEnabled(true);
      }

      async function startGame() {
        try {
          document.body.classList.remove("landing");
          if (!hasStarted) {
            hasStarted = true;
            document.getElementById("startBtn").style.display = "none";
          }
          await loadEmail();
        } catch (err) {
          console.error("ERROR IN START:", err);
          alert("Something broke. Check console.");
          setButtonsEnabled(true);
        }
      }

      async function nextEmail() {
        try {
          if (roundCount >= maxRounds) {
            endGame();
            return;
          }
          await loadEmail();
        } catch (err) {
          console.error("ERROR IN NEXT:", err);
          alert("Could not load next email");
          setButtonsEnabled(true);
        }
      }

      async function restartGame() {
        try {
          // Reset exactly like an initial start (but without returning to landing screen)
          roundCount = 0;
          scoreTotal = 0;
          currentEmail = null;
          answeredThisRound = false;

          document.body.classList.remove("completed");
          document.getElementById("result").innerText = "";
          document.getElementById("restartBtn").style.display = "none";
          document.getElementById("controls").style.display = "block";
          document.getElementById("emailBox").style.display = "block";
          document.getElementById("hud").style.display = "flex";
          document.getElementById("startBtn").style.display = "none";
          document.getElementById("nextBtn").style.display = "none";
          document.getElementById("nextBtn").disabled = false;
          document.getElementById("nextBtn").style.opacity = "1";

          updateHud();
          await loadEmail(); // increments to Round 1 and shows first email
        } catch (err) {
          console.error("ERROR IN RESTART:", err);
          alert("Could not restart game");
          setButtonsEnabled(true);
        }
      }

      async function makeDecision(choice) {
        try {
          if (answeredThisRound) return;
          answeredThisRound = true;
          setButtonsEnabled(false); // disable until Next Email
          const res = await fetch(`${API_BASE}/step`, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({
              action: String(choice).toLowerCase(),
            }),
          });

          const data = await res.json();

          console.log("STEP RESPONSE:", data);

          const reward = data?.reward ?? 0;
          const correct = !!data?.correct;

          if (correct) {
            scoreTotal += Number(reward) || 0;
            updateHud();
          }

          const feedback = buildFeedback(currentEmail, correct);
          document.getElementById("result").innerText =
            feedback + " | Reward: " + reward;

          // After answering: show Next Email (Start stays hidden).
          document.getElementById("nextBtn").style.display = "inline-block";
          if (roundCount >= maxRounds) {
            endGame();
          }
        } catch (err) {
          console.error("ERROR IN STEP:", err);
          alert("Step failed");
          // Allow retry on failure
          answeredThisRound = false;
          setButtonsEnabled(true);
        }
      }
    </script>
  </body>
</html>
